<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单填写</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,.15); }

        /* 头部 */
        .form-header { text-align: center; margin-bottom: 32px; }
        .form-header h1 { font-size: 26px; color: #303133; margin-bottom: 8px; }
        .form-header p { color: #909399; font-size: 14px; }

        /* 表单项 */
        .form-item { margin-bottom: 22px; }
        .form-item label { display: block; margin-bottom: 8px; font-weight: 500; color: #606266; font-size: 14px; }
        .form-item label .req { color: #f56c6c; margin-left: 2px; }
        .form-input { width: 100%; padding: 12px 16px; border: 1px solid #dcdfe6; border-radius: 8px; font-size: 14px; transition: .3s; font-family: inherit; }
        .form-input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,.12); }
        textarea.form-input { resize: vertical; min-height: 100px; }
        .form-input::placeholder { color: #c0c4cc; }

        /* 按钮 */
        .btn { width: 100%; padding: 14px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; transition: .3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,.3); }
        .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }

        /* 加载 */
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; margin-right: 8px; vertical-align: middle; }
        .spinner-lg { width: 40px; height: 40px; border-width: 4px; border-color: rgba(102,126,234,.2); border-top-color: #667eea; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 状态页 */
        .state-page { text-align: center; padding: 40px 20px; }
        .state-icon { font-size: 64px; margin-bottom: 16px; }
        .state-page h2 { margin-bottom: 10px; }
        .state-page p { color: #909399; }
        .state-page .success-title { color: #67c23a; }
        .state-page .error-title { color: #f56c6c; }

        .hidden { display: none !important; }

        /* 浮动客服按钮 */
        .chat-fab { position: fixed; bottom: 28px; right: 28px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; font-size: 26px; cursor: pointer; box-shadow: 0 6px 20px rgba(102,126,234,.4); z-index: 999; transition: .3s; display: flex; align-items: center; justify-content: center; }
        .chat-fab:hover { transform: scale(1.1); box-shadow: 0 8px 28px rgba(102,126,234,.5); }
        .chat-fab .badge { position: absolute; top: -2px; right: -2px; width: 18px; height: 18px; border-radius: 50%; background: #f56c6c; font-size: 11px; display: flex; align-items: center; justify-content: center; }

        /* 聊天弹窗 */
        .chat-popup { position: fixed; bottom: 96px; right: 28px; width: 380px; height: 520px; background: #fff; border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,.2); z-index: 1000; display: flex; flex-direction: column; overflow: hidden; animation: popIn .3s ease; }
        @keyframes popIn { from { opacity: 0; transform: translateY(20px) scale(.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .chat-popup-header { height: 52px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; }
        .chat-popup-header h3 { font-size: 15px; display: flex; align-items: center; gap: 8px; }
        .chat-popup-close { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; opacity: .8; }
        .chat-popup-close:hover { opacity: 1; }
        .chat-popup-messages { flex: 1; overflow-y: auto; padding: 16px; background: #f5f7fa; }
        .chat-popup-input { display: flex; align-items: center; gap: 8px; padding: 12px 14px; background: #fff; border-top: 1px solid #ebeef5; flex-shrink: 0; }
        .chat-popup-input input { flex: 1; padding: 8px 14px; border: 1px solid #e8eaec; border-radius: 20px; font-size: 13px; outline: none; }
        .chat-popup-input input:focus { border-color: #667eea; }
        .chat-popup-input button { width: 34px; height: 34px; border-radius: 50%; border: none; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .chat-popup-input button:disabled { opacity: .5; cursor: not-allowed; }

        /* 弹窗内消息 */
        .cp-msg { margin-bottom: 12px; animation: fadeIn .2s ease; }
        .cp-msg.user { text-align: right; }
        .cp-msg .cp-bubble { display: inline-block; max-width: 80%; padding: 8px 14px; border-radius: 14px; font-size: 13px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
        .cp-msg.bot .cp-bubble { background: #fff; color: #303133; border-top-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,.06); text-align: left; }
        .cp-msg.user .cp-bubble { background: #667eea; color: #fff; border-top-right-radius: 4px; }
        .cp-quick { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
        .cp-quick button { padding: 4px 12px; border: 1px solid #e8eaec; border-radius: 16px; background: #fff; color: #606266; font-size: 12px; cursor: pointer; transition: .2s; }
        .cp-quick button:hover { background: #ecf5ff; border-color: #409eff; color: #409eff; }
        .cp-typing { display: inline-flex; gap: 3px; padding: 4px 0; }
        .cp-typing span { width: 6px; height: 6px; border-radius: 50%; background: #c0c4cc; animation: bounce 1.4s infinite ease-in-out; }
        .cp-typing span:nth-child(2) { animation-delay: .2s; }
        .cp-typing span:nth-child(3) { animation-delay: .4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        @media (max-width: 480px) {
            .chat-popup { width: calc(100vw - 20px); right: 10px; bottom: 90px; height: 60vh; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <!-- 加载中 -->
        <div id="loadingState" class="state-page">
            <div class="spinner spinner-lg" style="margin:0 auto 16px"></div>
            <p style="color:#909399">加载中...</p>
        </div>

        <!-- 表单 -->
        <div id="formState" class="hidden">
            <div class="form-header">
                <h1 id="formTitle"></h1>
                <p id="formDesc"></p>
            </div>
            <form id="dynamicForm">
                <div id="formFields"></div>
                <div class="form-item">
                    <button type="submit" class="btn btn-primary" id="submitBtn">✅ 提交</button>
                </div>
            </form>
        </div>

        <!-- 成功 -->
        <div id="successState" class="hidden state-page">
            <div class="state-icon">🎉</div>
            <h2 class="success-title">提交成功！</h2>
            <p>感谢您的填写，我们已收到您的信息。</p>
        </div>

        <!-- 失败 -->
        <div id="errorState" class="hidden state-page">
            <div class="state-icon">❌</div>
            <h2 class="error-title">提交失败</h2>
            <p id="errorText">请稍后重试</p>
            <button class="btn btn-primary" style="margin-top:20px;width:auto;padding:10px 32px" onclick="showState('form')">重新填写</button>
        </div>

        <!-- 不存在 -->
        <div id="notFoundState" class="hidden state-page">
            <div class="state-icon">😔</div>
            <h2 class="error-title">表单不存在</h2>
            <p>请检查链接是否正确，或联系管理员。</p>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script src="chat-api.js"></script>
<script>
var currentFormCode = null;
var currentFormConfig = null;

function getUrlParam(name) {
    return new URLSearchParams(window.location.search).get(name);
}

document.addEventListener('DOMContentLoaded', function () {
    currentFormCode = getUrlParam('code');
    if (!currentFormCode) { showState('notFound'); return; }
    loadForm();
});

function loadForm() {
    UserFormApi.getForm(currentFormCode).then(function (form) {
        if (form.status !== 'ENABLED' && !(typeof form.status === 'object' && form.status.code === 1)) { showState('notFound'); return; }
        document.getElementById('formTitle').textContent = form.formName;
        document.getElementById('formDesc').textContent = form.formDesc || '请填写以下信息';
        try {
            currentFormConfig = JSON.parse(form.formConfig);
            renderFormFields();
            showState('form');
        } catch (e) {
            showState('notFound');
        }
    }).catch(function (e) {
        showState('notFound');
    });
}

function renderFormFields() {
    var container = document.getElementById('formFields');
    container.innerHTML = '';
    if (!currentFormConfig || !currentFormConfig.fields) return;

    currentFormConfig.fields.forEach(function (field) {
        var div = document.createElement('div');
        div.className = 'form-item';
        var label = '<label>' + field.label + (field.required ? '<span class="req">*</span>' : '') + '</label>';
        var input = '';
        var ph = field.placeholder || '';
        var req = field.required ? ' required' : '';

        switch (field.type) {
            case 'textarea':
                input = '<textarea name="' + field.key + '" class="form-input" placeholder="' + ph + '"' + req + '></textarea>';
                break;
            case 'select':
                var opts = '<option value="">请选择</option>';
                if (field.options) field.options.forEach(function (o) { opts += '<option value="' + o.value + '">' + o.label + '</option>'; });
                input = '<select name="' + field.key + '" class="form-input"' + req + '>' + opts + '</select>';
                break;
            default:
                input = '<input type="' + (field.type || 'text') + '" name="' + field.key + '" class="form-input" placeholder="' + ph + '"' + req + '>';
        }
        div.innerHTML = label + input;
        container.appendChild(div);
    });

    document.getElementById('dynamicForm').addEventListener('submit', handleSubmit);
}

function handleSubmit(e) {
    e.preventDefault();
    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>提交中...';

    var formData = {};
    var els = document.getElementById('dynamicForm').elements;
    for (var i = 0; i < els.length; i++) {
        if (els[i].name) formData[els[i].name] = els[i].value;
    }

    UserFormApi.submitForm({
        formCode: currentFormCode,
        submissionData: JSON.stringify(formData),
        submitter: formData.name || formData.email || '匿名用户'
    }).then(function () {
        showState('success');
    }).catch(function (e) {
        document.getElementById('errorText').textContent = e.message || '提交失败，请稍后重试';
        showState('error');
    }).finally(function () {
        btn.disabled = false;
        btn.innerHTML = '✅ 提交';
    });
}

function showState(state) {
    ['loading', 'form', 'success', 'error', 'notFound'].forEach(function (s) {
        document.getElementById(s + 'State').classList.toggle('hidden', s !== state);
    });
}
</script>

<!-- 浮动客服按钮 -->
<button class="chat-fab" id="chatFab" onclick="toggleChatPopup()">💬</button>

<!-- 聊天弹窗 -->
<div class="chat-popup hidden" id="chatPopup">
    <div class="chat-popup-header">
        <h3>🤖 小 X 智能客服</h3>
        <button class="chat-popup-close" onclick="toggleChatPopup()">✕</button>
    </div>
    <div class="chat-popup-messages" id="cpMessages">
        <div class="cp-msg bot">
            <div class="cp-bubble">你好！我是 x-from 智能客服「小 X」🤖，有什么可以帮您的？</div>
            <div class="cp-quick">
                <button onclick="cpSend('如何创建表单？')">如何创建表单？</button>
                <button onclick="cpSend('支持哪些字段类型？')">字段类型</button>
                <button onclick="cpSend('如何分享表单？')">分享表单</button>
            </div>
        </div>
    </div>
    <div class="chat-popup-input">
        <input type="text" id="cpInput" placeholder="输入您的问题..." maxlength="200" onkeydown="if(event.key==='Enter')cpSend()">
        <button id="cpSendBtn" onclick="cpSend()">➤</button>
    </div>
</div>

<script>
var cpSessionId = null;
var cpHistory = [];
var cpSending = false;

function toggleChatPopup() {
    var popup = document.getElementById('chatPopup');
    var fab = document.getElementById('chatFab');
    var isHidden = popup.classList.contains('hidden');
    popup.classList.toggle('hidden');
    fab.innerHTML = isHidden ? '✕' : '💬';
    if (isHidden) document.getElementById('cpInput').focus();
}

function cpAppendMsg(role, text, extra) {
    var container = document.getElementById('cpMessages');
    var div = document.createElement('div');
    div.className = 'cp-msg ' + role;
    div.innerHTML = '<div class="cp-bubble">' + cpEsc(text) + '</div>' + (extra || '');
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function cpEsc(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML.replace(/\n/g, '<br>');
}

function cpShowTyping() {
    var container = document.getElementById('cpMessages');
    var div = document.createElement('div');
    div.className = 'cp-msg bot';
    div.id = 'cpTyping';
    div.innerHTML = '<div class="cp-bubble"><div class="cp-typing"><span></span><span></span><span></span></div></div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function cpHideTyping() {
    var el = document.getElementById('cpTyping');
    if (el) el.remove();
}

function cpSend(quickText) {
    if (cpSending) return;
    var input = document.getElementById('cpInput');
    var text = quickText || input.value.trim();
    if (!text) return;

    cpAppendMsg('user', text);
    cpHistory.push({ role: 'user', content: text });
    input.value = '';

    cpSending = true;
    document.getElementById('cpSendBtn').disabled = true;
    cpShowTyping();

    ChatApi.ask(text, cpSessionId, cpHistory.slice(0, -1)).then(function (data) {
        cpHideTyping();
        cpSessionId = data.sessionId;
        cpHistory.push({ role: 'assistant', content: data.reply });
        cpAppendMsg('bot', data.reply);
    }).catch(function (e) {
        cpHideTyping();
        cpAppendMsg('bot', '抱歉，暂时无法回复，请稍后再试 😥');
    }).finally(function () {
        cpSending = false;
        document.getElementById('cpSendBtn').disabled = false;
    });
}
</script>
</body>
</html>
