<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能客服 - x-from</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; flex-direction: column; }

        /* 顶部栏 */
        .topbar { height: 56px; background: rgba(255,255,255,.15); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 20px; gap: 12px; }
        .topbar-avatar { width: 36px; height: 36px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
        .topbar-info h1 { font-size: 16px; color: #fff; font-weight: 600; }
        .topbar-info p { font-size: 12px; color: rgba(255,255,255,.75); }

        /* 聊天区域 */
        .chat-container { flex: 1; display: flex; flex-direction: column; max-width: 800px; width: 100%; margin: 0 auto; padding: 0; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; }

        /* 消息气泡 */
        .msg-row { display: flex; margin-bottom: 16px; animation: fadeIn .3s ease; }
        .msg-row.user { justify-content: flex-end; }
        .msg-row.bot { justify-content: flex-start; }

        .msg-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .msg-row.bot .msg-avatar { background: #fff; margin-right: 10px; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
        .msg-row.user .msg-avatar { background: #667eea; margin-left: 10px; color: #fff; }

        .msg-bubble { max-width: 70%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.7; word-break: break-word; white-space: pre-wrap; }
        .msg-row.bot .msg-bubble { background: #fff; color: #303133; border-top-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
        .msg-row.user .msg-bubble { background: #667eea; color: #fff; border-top-right-radius: 4px; }

        .msg-time { font-size: 11px; color: #c0c4cc; margin-top: 4px; }
        .msg-row.user .msg-time { text-align: right; }

        /* 快捷问题 */
        .quick-questions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .quick-btn { padding: 6px 14px; border: 1px solid #e8eaec; border-radius: 20px; background: #f5f7fa; color: #606266; font-size: 13px; cursor: pointer; transition: .2s; }
        .quick-btn:hover { background: #ecf5ff; border-color: #409eff; color: #409eff; }

        /* 打字指示器 */
        .typing-dots { display: inline-flex; gap: 4px; padding: 4px 0; }
        .typing-dots span { width: 8px; height: 8px; border-radius: 50%; background: #c0c4cc; animation: bounce 1.4s infinite ease-in-out; }
        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: .2s; }
        .typing-dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* 输入区域 */
        .chat-input-bar { background: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 10px; box-shadow: 0 -2px 10px rgba(0,0,0,.06); }
        .chat-input { flex: 1; padding: 10px 16px; border: 1px solid #e8eaec; border-radius: 24px; font-size: 14px; outline: none; transition: .3s; }
        .chat-input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,.15); }
        .chat-input::placeholder { color: #c0c4cc; }
        .send-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 18px; cursor: pointer; transition: .3s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(102,126,234,.4); }
        .send-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 底部信息 */
        .powered { text-align: center; padding: 8px; font-size: 11px; color: rgba(255,255,255,.5); }
    </style>
</head>
<body>
    <!-- 顶部栏 -->
    <div class="topbar">
        <div class="topbar-avatar">🤖</div>
        <div class="topbar-info">
            <h1>小 X 智能客服</h1>
            <p>为您解答 x-from 表单平台相关问题</p>
        </div>
    </div>

    <!-- 聊天区域 -->
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <!-- 欢迎消息 -->
            <div class="msg-row bot">
                <div class="msg-avatar">🤖</div>
                <div>
                    <div class="msg-bubble">你好！我是 x-from 平台的智能客服「小 X」🤖，很高兴为您服务！\n\n我可以帮您解答关于表单创建、字段设计、数据查询等任何平台使用问题。请问有什么可以帮您的？</div>
                    <div class="quick-questions">
                        <button class="quick-btn" onclick="sendQuick('如何创建表单？')">如何创建表单？</button>
                        <button class="quick-btn" onclick="sendQuick('支持哪些字段类型？')">支持哪些字段类型？</button>
                        <button class="quick-btn" onclick="sendQuick('如何分享表单给用户？')">如何分享表单？</button>
                        <button class="quick-btn" onclick="sendQuick('怎么查看用户提交的数据？')">查看提交数据</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 输入栏 -->
        <div class="chat-input-bar">
            <input type="text" class="chat-input" id="msgInput" placeholder="输入您的问题..." maxlength="500" onkeydown="if(event.key==='Enter')handleSend()">
            <button class="send-btn" id="sendBtn" onclick="handleSend()">➤</button>
        </div>
    </div>

    <div class="powered">Powered by x-from · qwen2.5:0.5b</div>

<script src="chat-api.js"></script>
<script>
var sessionId = null;
var chatHistory = []; // { role, content }
var isSending = false;

function getNow() {
    var d = new Date();
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function appendMsg(role, text, extra) {
    var container = document.getElementById('chatMessages');
    var row = document.createElement('div');
    row.className = 'msg-row ' + (role === 'user' ? 'user' : 'bot');

    var avatar = role === 'user' ? '👤' : '🤖';
    var avatarDiv = '<div class="msg-avatar">' + avatar + '</div>';
    var bubbleDiv = '<div class="msg-bubble">' + escHtml(text) + '</div>';
    var timeDiv = '<div class="msg-time">' + getNow() + '</div>';

    if (role === 'user') {
        row.innerHTML = '<div>' + bubbleDiv + timeDiv + '</div>' + avatarDiv;
    } else {
        row.innerHTML = avatarDiv + '<div>' + bubbleDiv + (extra || '') + timeDiv + '</div>';
    }

    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
}

function showTyping() {
    var container = document.getElementById('chatMessages');
    var row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typingIndicator';
    row.innerHTML = '<div class="msg-avatar">🤖</div><div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>';
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
}

function hideTyping() {
    var el = document.getElementById('typingIndicator');
    if (el) el.remove();
}

function escHtml(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML.replace(/\n/g, '<br>');
}

function sendQuick(text) {
    document.getElementById('msgInput').value = text;
    handleSend();
}

function handleSend() {
    if (isSending) return;

    var input = document.getElementById('msgInput');
    var text = input.value.trim();
    if (!text) return;

    // 显示用户消息
    appendMsg('user', text);
    chatHistory.push({ role: 'user', content: text });
    input.value = '';

    // 禁用输入
    isSending = true;
    document.getElementById('sendBtn').disabled = true;
    showTyping();

    // 调用 API
    ChatApi.ask(text, sessionId, chatHistory.slice(0, -1)).then(function (data) {
        hideTyping();
        sessionId = data.sessionId;
        chatHistory.push({ role: 'assistant', content: data.reply });
        appendMsg('bot', data.reply);
    }).catch(function (e) {
        hideTyping();
        appendMsg('bot', '抱歉，我暂时无法回复，请稍后再试 😥\n错误信息：' + e.message);
    }).finally(function () {
        isSending = false;
        document.getElementById('sendBtn').disabled = false;
        input.focus();
    });
}

// 页面加载后聚焦输入框
window.addEventListener('load', function () {
    document.getElementById('msgInput').focus();
});
</script>
</body>
</html>
