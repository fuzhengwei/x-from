version: '3.8'

services:
  x-from-app:
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: x-from-app
    restart: on-failure
    ports:
      - "8091:8091"
    environment:
      - TZ=Asia/Shanghai
      - SPRING_PROFILES_ACTIVE=dev
      # Docker 容器内通过服务名访问 Ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      # Docker 容器内通过服务名访问 MySQL
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/x_from?useUnicode=true&characterEncoding=utf8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=Asia/Shanghai&useSSL=false
    volumes:
      - ./logs:/data/log
    networks:
      - x-from-network
    depends_on:
      - mysql
      - redis
      - ollama

  x-from-nginx:
    image: registry.cn-hangzhou.aliyuncs.com/xfg-studio/nginx:1.25.1-alpine
    container_name: x-from-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/html:/usr/share/nginx/html
      - ./nginx/conf:/etc/nginx/conf.d
    networks:
      - x-from-network
    depends_on:
      - x-from-app

  mysql:
    image: registry.cn-hangzhou.aliyuncs.com/xfg-studio/mysql:8.0.32
    container_name: x-from-mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: x_from
    ports:
      - "13306:3306"
    volumes:
      - ./mysql/my.cnf:/etc/mysql/conf.d/mysql.cnf:ro
      - ./mysql/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
      - x-from-network

  redis:
    image: registry.cn-hangzhou.aliyuncs.com/xfg-studio/redis:6.2
    container_name: x-from-redis
    restart: always
    hostname: redis
    privileged: true
    ports:
      - "16379:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - x-from-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  ollama:
    image: registry.cn-hangzhou.aliyuncs.com/xfg-studio/ollama:0.5.10
    container_name: x-from-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - x-from-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  x-from-network:
    driver: bridge

volumes:
  ollama_data:
