<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单填写</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,.15); }

        /* 头部 */
        .form-header { text-align: center; margin-bottom: 32px; }
        .form-header h1 { font-size: 26px; color: #303133; margin-bottom: 8px; }
        .form-header p { color: #909399; font-size: 14px; }

        /* 表单项 */
        .form-item { margin-bottom: 22px; }
        .form-item label { display: block; margin-bottom: 8px; font-weight: 500; color: #606266; font-size: 14px; }
        .form-item label .req { color: #f56c6c; margin-left: 2px; }
        .form-input { width: 100%; padding: 12px 16px; border: 1px solid #dcdfe6; border-radius: 8px; font-size: 14px; transition: .3s; font-family: inherit; }
        .form-input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,.12); }
        textarea.form-input { resize: vertical; min-height: 100px; }
        .form-input::placeholder { color: #c0c4cc; }

        /* 按钮 */
        .btn { width: 100%; padding: 14px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; transition: .3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,.3); }
        .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }

        /* 加载 */
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; margin-right: 8px; vertical-align: middle; }
        .spinner-lg { width: 40px; height: 40px; border-width: 4px; border-color: rgba(102,126,234,.2); border-top-color: #667eea; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 状态页 */
        .state-page { text-align: center; padding: 40px 20px; }
        .state-icon { font-size: 64px; margin-bottom: 16px; }
        .state-page h2 { margin-bottom: 10px; }
        .state-page p { color: #909399; }
        .state-page .success-title { color: #67c23a; }
        .state-page .error-title { color: #f56c6c; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <!-- 加载中 -->
        <div id="loadingState" class="state-page">
            <div class="spinner spinner-lg" style="margin:0 auto 16px"></div>
            <p style="color:#909399">加载中...</p>
        </div>

        <!-- 表单 -->
        <div id="formState" class="hidden">
            <div class="form-header">
                <h1 id="formTitle"></h1>
                <p id="formDesc"></p>
            </div>
            <form id="dynamicForm">
                <div id="formFields"></div>
                <div class="form-item">
                    <button type="submit" class="btn btn-primary" id="submitBtn">✅ 提交</button>
                </div>
            </form>
        </div>

        <!-- 成功 -->
        <div id="successState" class="hidden state-page">
            <div class="state-icon">🎉</div>
            <h2 class="success-title">提交成功！</h2>
            <p>感谢您的填写，我们已收到您的信息。</p>
        </div>

        <!-- 失败 -->
        <div id="errorState" class="hidden state-page">
            <div class="state-icon">❌</div>
            <h2 class="error-title">提交失败</h2>
            <p id="errorText">请稍后重试</p>
            <button class="btn btn-primary" style="margin-top:20px;width:auto;padding:10px 32px" onclick="showState('form')">重新填写</button>
        </div>

        <!-- 不存在 -->
        <div id="notFoundState" class="hidden state-page">
            <div class="state-icon">😔</div>
            <h2 class="error-title">表单不存在</h2>
            <p>请检查链接是否正确，或联系管理员。</p>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
var currentFormCode = null;
var currentFormConfig = null;

function getUrlParam(name) {
    return new URLSearchParams(window.location.search).get(name);
}

document.addEventListener('DOMContentLoaded', function () {
    currentFormCode = getUrlParam('code');
    if (!currentFormCode) { showState('notFound'); return; }
    loadForm();
});

function loadForm() {
    UserFormApi.getForm(currentFormCode).then(function (form) {
        if (form.status !== 'ENABLED' && !(typeof form.status === 'object' && form.status.code === 1)) { showState('notFound'); return; }
        document.getElementById('formTitle').textContent = form.formName;
        document.getElementById('formDesc').textContent = form.formDesc || '请填写以下信息';
        try {
            currentFormConfig = JSON.parse(form.formConfig);
            renderFormFields();
            showState('form');
        } catch (e) {
            showState('notFound');
        }
    }).catch(function (e) {
        showState('notFound');
    });
}

function renderFormFields() {
    var container = document.getElementById('formFields');
    container.innerHTML = '';
    if (!currentFormConfig || !currentFormConfig.fields) return;

    currentFormConfig.fields.forEach(function (field) {
        var div = document.createElement('div');
        div.className = 'form-item';
        var label = '<label>' + field.label + (field.required ? '<span class="req">*</span>' : '') + '</label>';
        var input = '';
        var ph = field.placeholder || '';
        var req = field.required ? ' required' : '';

        switch (field.type) {
            case 'textarea':
                input = '<textarea name="' + field.key + '" class="form-input" placeholder="' + ph + '"' + req + '></textarea>';
                break;
            case 'select':
                var opts = '<option value="">请选择</option>';
                if (field.options) field.options.forEach(function (o) { opts += '<option value="' + o.value + '">' + o.label + '</option>'; });
                input = '<select name="' + field.key + '" class="form-input"' + req + '>' + opts + '</select>';
                break;
            default:
                input = '<input type="' + (field.type || 'text') + '" name="' + field.key + '" class="form-input" placeholder="' + ph + '"' + req + '>';
        }
        div.innerHTML = label + input;
        container.appendChild(div);
    });

    document.getElementById('dynamicForm').addEventListener('submit', handleSubmit);
}

function handleSubmit(e) {
    e.preventDefault();
    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>提交中...';

    var formData = {};
    var els = document.getElementById('dynamicForm').elements;
    for (var i = 0; i < els.length; i++) {
        if (els[i].name) formData[els[i].name] = els[i].value;
    }

    UserFormApi.submitForm({
        formCode: currentFormCode,
        submissionData: JSON.stringify(formData),
        submitter: formData.name || formData.email || '匿名用户'
    }).then(function () {
        showState('success');
    }).catch(function (e) {
        document.getElementById('errorText').textContent = e.message || '提交失败，请稍后重试';
        showState('error');
    }).finally(function () {
        btn.disabled = false;
        btn.innerHTML = '✅ 提交';
    });
}

function showState(state) {
    ['loading', 'form', 'success', 'error', 'notFound'].forEach(function (s) {
        document.getElementById(s + 'State').classList.toggle('hidden', s !== state);
    });
}
</script>
</body>
</html>
